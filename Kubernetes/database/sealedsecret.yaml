---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongo-root-secret
  namespace: threetier-app
spec:
  encryptedData:
    MONGO_INITDB_DATABASE: 
    MONGO_INITDB_ROOT_PASSWORD: 
    MONGO_INITDB_ROOT_USERNAME: 
  template:
    metadata:
      name: mongo-root-secret
      namespace: threetier-app
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongodb-app-secret
  namespace: threetier-app
spec:
  encryptedData:
    MONGO_APP_DB: 
    MONGO_APP_PASSWORD: 
    MONGO_APP_USER: 
  template:
    metadata:
      name: mongodb-app-secret
      namespace: threetier-app
    type: Opaque